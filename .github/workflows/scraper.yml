name: Scraper YML Feed

on:
  push:
    branches: [ main, master ]
    paths:
      - 'scraper.py'
      - 'config.py'
      - '.env'
      - 'requirements.txt'
  schedule:
    # Запуск каждый день в 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:  # Возможность ручного запуска

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Права на запись в репозиторий

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Установка браузеров Playwright
        run: playwright install chromium --with-deps

      - name: Запуск скрапера
        run: python scraper.py
        env:
          CATEGORY_URL: ${{ secrets.CATEGORY_URL }}

      - name: Проверка наличия feed.yml
        run: |
          if [ -f "feed.yml" ]; then
            echo "feed.yml создан успешно"
            ls -la feed.yml
          else
            echo "feed.yml не найден"
            exit 1
          fi

      - name: Загрузка artifact для Pages
        uses: actions/upload-artifact@v4
        with:
          name: yml-feed
          path: feed.yml
          retention-days: 1

      - name: Коммит и пуш изменений
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Обновление YML фида [skip ci]"
          file_pattern: "feed.yml"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

  deploy-pages:
    needs: scrape
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Настройка Pages
        uses: actions/configure-pages@v4

      - name: Скачивание YML файла
        uses: actions/download-artifact@v4
        with:
          name: yml-feed

      - name: Подготовка файлов для Pages
        run: |
          mkdir -p ./public
          if [ -f "feed.yml" ]; then
            cp feed.yml ./public/
            echo "feed.yml успешно скопирован в public/"
            ls -la feed.yml
          else
            echo "Создание пустого feed.yml"
            echo '<?xml version="1.0" encoding="utf-8"?><yml_catalog></yml_catalog>' > ./public/feed.yml
          fi

      - name: Загрузка артефакта
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: Деплой на GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
